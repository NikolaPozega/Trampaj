name: Build Google Play AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify no build hacks
        run: |
          ! grep -R "hermesc replaced\|no-op\|replace-bundle\|expo export\|createBundleReleaseJsAndAssets.*-x\|transformIgnorePatterns\|PACKAGES_TO_TRANSFORM" .github artifacts/mobile/babel.config.js artifacts/mobile/metro.config.js || exit 1

      - name: Expo prebuild Android
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_DOMAIN: trampaj.hr
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Prepare signing
        working-directory: artifacts/mobile/android
        run: |
          mkdir -p app/keystores
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/keystores/upload.keystore
            echo "Using existing signing keystore from secrets"
          else
            keytool -genkeypair -v \
              -keystore app/keystores/upload.keystore \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Trampaj Upload,O=Trampaj,C=HR"
            echo "WARNING: temporary upload keystore generated — za Play Store mora biti trajno spremljen!"
          fi

      - name: Build release AAB
        working-directory: artifacts/mobile/android
        env:
          EXPO_PUBLIC_DOMAIN: trampaj.hr
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/keystores/upload.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'android' }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS || 'upload' }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD || 'android' }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: trampaj-google-play-aab
          path: artifacts/mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 14
