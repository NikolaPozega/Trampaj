name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Remove baseUrl from app.json
        run: |
          node -e "
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('artifacts/mobile/app.json'));
          if (d.expo && d.expo.experiments) delete d.expo.experiments.baseUrl;
          fs.writeFileSync('artifacts/mobile/app.json', JSON.stringify(d, null, 2));
          console.log('baseUrl removed');
          "

      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: pnpm install --no-frozen-lockfile

      - name: Expo prebuild (generate android/ directory)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_DOMAIN: trampaj.hr
        run: npx expo prebuild --platform android --clean --no-install

      - name: Replace hermesc with bypass wrapper (hermesc linux64 broken)
        run: |
          HERMESC=$(find node_modules -path "*/hermesc/linux64-bin/hermesc" -type f 2>/dev/null | head -1)
          if [ -z "$HERMESC" ]; then
            echo "hermesc not found in workspace node_modules, trying artifacts/mobile..."
            HERMESC=$(find artifacts/mobile/node_modules -path "*/hermesc/linux64-bin/hermesc" -type f 2>/dev/null | head -1)
          fi
          echo "Found hermesc: $HERMESC"
          mv "$HERMESC" "${HERMESC}.orig"
          cat > "$HERMESC" << 'HERMESC_WRAPPER'
          #!/bin/bash
          OUTPUT=""
          INPUT=""
          i=1
          while [ $i -le $# ]; do
            ARG="${!i}"
            if [ "$ARG" = "-out" ]; then
              i=$((i+1)); OUTPUT="${!i}"
            elif [[ "$ARG" != "-"* ]] && [ -n "$ARG" ] && [ -z "$INPUT" ]; then
              INPUT="$ARG"
            fi
            i=$((i+1))
          done
          [ -n "$INPUT" ] && [ -n "$OUTPUT" ] && cp "$INPUT" "$OUTPUT"
          [ -n "$OUTPUT" ] && printf '{"version":3,"sources":[],"mappings":""}' > "${OUTPUT}.map"
          exit 0
          HERMESC_WRAPPER
          chmod +x "$HERMESC"
          echo "hermesc replaced with no-op wrapper"

      - name: Pre-bundle JS with expo export
        working-directory: artifacts/mobile
        env:
          NODE_ENV: production
          EXPO_PUBLIC_DOMAIN: trampaj.hr
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          mkdir -p /tmp/expo-bundle
          node_modules/.bin/expo export \
            --platform android \
            --output-dir /tmp/expo-bundle \
            --no-bytecode

          BUNDLE=$(ls /tmp/expo-bundle/_expo/static/js/android/*.js 2>/dev/null | head -1)
          echo "Generated bundle: $BUNDLE"

          mkdir -p android/app/src/main/assets
          cp "$BUNDLE" android/app/src/main/assets/index.android.bundle

      - name: Verify pre-built bundle (fail-fast)
        run: |
          BUNDLE="artifacts/mobile/android/app/src/main/assets/index.android.bundle"

          # 1. File postoji i nije prazan
          if [ ! -s "$BUNDLE" ]; then
            echo "ERROR: Bundle ne postoji ili je prazan!"
            exit 1
          fi
          echo "OK: Bundle postoji, veličina: $(wc -c < "$BUNDLE") bytes"

          # 2. class MessageQueue { mora biti 0
          COUNT=$(grep -c "class MessageQueue {" "$BUNDLE" || true)
          echo "class MessageQueue { : $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAIL: Bundle sadrži 'class MessageQueue {' — Hermes će pasti!"
            exit 1
          fi

          # 3. _default = MessageQueue mora biti 0
          COUNT=$(grep -c "_default = MessageQueue" "$BUNDLE" || true)
          echo "_default = MessageQueue : $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAIL: Bundle sadrži '_default = MessageQueue'"
            exit 1
          fi

          # 4. raw #name mora biti 0
          COUNT=$(grep -cP '(?<![a-zA-Z0-9_])#name(?![a-zA-Z0-9_])' "$BUNDLE" || true)
          echo "#name raw field : $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAIL: Bundle sadrži raw '#name' private field"
            exit 1
          fi

          # 5. raw #code mora biti 0
          COUNT=$(grep -cP '(?<![a-zA-Z0-9_])#code(?![a-zA-Z0-9_])' "$BUNDLE" || true)
          echo "#code raw field : $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAIL: Bundle sadrži raw '#code' private field"
            exit 1
          fi

          # 6. DOMException mora biti u prvih 20 linija
          if ! head -20 "$BUNDLE" | grep -q "DOMException"; then
            echo "FAIL: DOMException polyfill nije u prvih 20 linija bundlea!"
            exit 1
          fi
          echo "OK: DOMException polyfill je u headeru"

          echo "=== SVE PROVJERE PROŠLE ==="

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkey -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        working-directory: artifacts/mobile/android
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_DOMAIN: trampaj.hr
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -x createBundleReleaseJsAndAssets \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Verify bundle inside APK (fail-fast)
        run: |
          APK=$(ls artifacts/mobile/android/app/build/outputs/apk/release/*.apk 2>/dev/null | head -1)
          echo "APK: $APK"

          # Izvuci index.android.bundle iz APK-a
          mkdir -p /tmp/apk-verify
          cd /tmp/apk-verify
          unzip -p "$APK" assets/index.android.bundle > apk-bundle.js
          echo "Bundle iz APK-a, veličina: $(wc -c < apk-bundle.js) bytes"

          # 1. class MessageQueue {
          COUNT=$(grep -c "class MessageQueue {" apk-bundle.js || true)
          echo "class MessageQueue { : $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAIL: APK bundle sadrži 'class MessageQueue {' — app će pasti!"
            exit 1
          fi

          # 2. _default = MessageQueue
          COUNT=$(grep -c "_default = MessageQueue" apk-bundle.js || true)
          echo "_default = MessageQueue : $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAIL: APK bundle sadrži '_default = MessageQueue'"
            exit 1
          fi

          # 3. raw #name
          COUNT=$(grep -cP '(?<![a-zA-Z0-9_])#name(?![a-zA-Z0-9_])' apk-bundle.js || true)
          echo "#name raw field : $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAIL: APK bundle sadrži raw '#name'"
            exit 1
          fi

          # 4. raw #code
          COUNT=$(grep -cP '(?<![a-zA-Z0-9_])#code(?![a-zA-Z0-9_])' apk-bundle.js || true)
          echo "#code raw field : $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "FAIL: APK bundle sadrži raw '#code'"
            exit 1
          fi

          # 5. DOMException u prvih 20 linija
          if ! head -20 apk-bundle.js | grep -q "DOMException"; then
            echo "FAIL: DOMException polyfill nije u headeru APK bundlea!"
            exit 1
          fi
          echo "OK: DOMException polyfill je u APK bundle headeru"

          echo "=== APK BUNDLE PROVJERE PROŠLE — APK je čist ==="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trampaj-v1.1.0-release
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
