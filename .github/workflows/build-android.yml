name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Remove baseUrl from app.json
        run: |
          node -e "
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('artifacts/mobile/app.json'));
          if (d.expo && d.expo.experiments) delete d.expo.experiments.baseUrl;
          fs.writeFileSync('artifacts/mobile/app.json', JSON.stringify(d, null, 2));
          console.log('baseUrl removed');
          "

      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: pnpm install --no-frozen-lockfile

      - name: Expo prebuild (generate android/ directory)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_DOMAIN: trampaj.hr
        run: npx expo prebuild --platform android --clean --no-install

      - name: Pre-bundle JS (bypass hermesc)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_DOMAIN: trampaj.hr
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false

      - name: Build release APK
        working-directory: artifacts/mobile/android
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_DOMAIN: trampaj.hr
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -x createBundleReleaseJsAndAssets \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trampaj-v1.1.0-release
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
