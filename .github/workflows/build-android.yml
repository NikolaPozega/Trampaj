name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Remove baseUrl from app.json
        run: |
          node -e "
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('artifacts/mobile/app.json'));
          if (d.expo && d.expo.experiments) delete d.expo.experiments.baseUrl;
          fs.writeFileSync('artifacts/mobile/app.json', JSON.stringify(d, null, 2));
          console.log('baseUrl removed');
          "

      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: pnpm install --no-frozen-lockfile

      - name: Expo prebuild (generate android/ directory)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_DOMAIN: trampaj.hr
        run: npx expo prebuild --platform android --clean --no-install

      - name: Replace hermesc with bypass wrapper (hermesc linux64 broken)
        run: |
          HERMESC=$(find node_modules artifacts/mobile/node_modules \
            -path "*/hermesc/linux64-bin/hermesc" -type f 2>/dev/null | head -1)
          echo "Found hermesc: $HERMESC"
          mv "$HERMESC" "${HERMESC}.orig"
          cat > "$HERMESC" << 'HERMESC_WRAPPER'
          #!/bin/bash
          OUTPUT=""
          INPUT=""
          i=1
          while [ $i -le $# ]; do
            ARG="${!i}"
            if [ "$ARG" = "-out" ]; then
              i=$((i+1)); OUTPUT="${!i}"
            elif [[ "$ARG" != "-"* ]] && [ -n "$ARG" ] && [ -z "$INPUT" ]; then
              INPUT="$ARG"
            fi
            i=$((i+1))
          done
          [ -n "$INPUT" ] && [ -n "$OUTPUT" ] && cp "$INPUT" "$OUTPUT"
          [ -n "$OUTPUT" ] && printf '{"version":3,"sources":[],"mappings":""}' > "${OUTPUT}.map"
          exit 0
          HERMESC_WRAPPER
          chmod +x "$HERMESC"
          echo "hermesc replaced with no-op wrapper"

      - name: Generate expo export bundle (correct Babel pipeline)
        working-directory: artifacts/mobile
        env:
          NODE_ENV: production
          EXPO_PUBLIC_DOMAIN: trampaj.hr
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          node_modules/.bin/expo export \
            --platform android \
            --output-dir /tmp/expo-bundle \
            --no-bytecode

          BUNDLE=$(ls /tmp/expo-bundle/_expo/static/js/android/*.js | head -1)
          cp "$BUNDLE" /tmp/expo-bundle-correct.js

          echo "=== expo-bundle-correct.js ==="
          echo "Veličina : $(wc -c < /tmp/expo-bundle-correct.js) bytes"
          SHA_EXPO=$(sha256sum /tmp/expo-bundle-correct.js | cut -d' ' -f1)
          echo "SHA256   : $SHA_EXPO"

      - name: Fail-fast provjere na expo bundleu
        run: |
          BUNDLE="/tmp/expo-bundle-correct.js"

          C=$(grep -c "class MessageQueue {" "$BUNDLE" || true)
          echo "class MessageQueue { : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -c "_default = MessageQueue" "$BUNDLE" || true)
          echo "_default = MessageQueue : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -cP '(?<![a-zA-Z0-9_])#name(?![a-zA-Z0-9_])' "$BUNDLE" || true)
          echo "#name raw : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -cP '(?<![a-zA-Z0-9_])#code(?![a-zA-Z0-9_])' "$BUNDLE" || true)
          echo "#code raw : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          if ! head -20 "$BUNDLE" | grep -q "DOMException"; then
            echo "FAIL: DOMException nije u headeru expo bundlea"
            exit 1
          fi
          echo "DOMException u headeru : OK"
          echo "=== expo bundle provjere prošle ==="

      - name: Create Gradle init script (ne mijenja build.gradle)
        run: |
          BUILD_GRADLE_MD5=$(md5sum artifacts/mobile/android/app/build.gradle | cut -d' ' -f1)
          echo "android/app/build.gradle MD5 BEFORE: $BUILD_GRADLE_MD5"

          cat > /tmp/replace-bundle.init.gradle << 'INIT_EOF'
          allprojects {
              tasks.configureEach { task ->
                  if (task.name == "createBundleReleaseJsAndAssets") {
                      task.doLast {
                          def correct = new File("/tmp/expo-bundle-correct.js")
                          def outDir  = new File(task.project.buildDir,
                              "generated/assets/createBundleReleaseJsAndAssets")
                          def out     = new File(outDir, "index.android.bundle")
                          if (!correct.exists())
                              throw new GradleException("Pre-built bundle not found: /tmp/expo-bundle-correct.js")
                          if (!out.exists())
                              throw new GradleException("Gradle bundle output not found: ${out.absolutePath}")
                          out.bytes = correct.bytes
                          println("doLast: bundle replaced (${out.length()} bytes)")
                      }
                  }
              }
          }
          INIT_EOF

          echo "Init script created: /tmp/replace-bundle.init.gradle"

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkey -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK (assembleRelease + init script)
        working-directory: artifacts/mobile/android
        env:
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_DOMAIN: trampaj.hr
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            --init-script /tmp/replace-bundle.init.gradle \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Verify android/app/build.gradle nije mijenjan
        run: |
          BUILD_GRADLE_MD5_AFTER=$(md5sum artifacts/mobile/android/app/build.gradle | cut -d' ' -f1)
          echo "android/app/build.gradle MD5 AFTER: $BUILD_GRADLE_MD5_AFTER"

      - name: Verify APK bundle — SHA256 + grep provjere (fail-fast)
        run: |
          APK=$(ls artifacts/mobile/android/app/build/outputs/apk/release/*.apk 2>/dev/null | head -1)
          echo "APK: $APK"
          echo "APK veličina: $(wc -c < "$APK") bytes"

          mkdir -p /tmp/apk-verify
          unzip -p "$APK" assets/index.android.bundle > /tmp/apk-verify/apk-bundle.js
          APK_BUNDLE="/tmp/apk-verify/apk-bundle.js"
          echo "APK extracted bundle veličina: $(wc -c < "$APK_BUNDLE") bytes"

          echo ""
          echo "=== SHA256 usporedba ==="
          SHA_EXPO=$(sha256sum /tmp/expo-bundle-correct.js | cut -d' ' -f1)
          SHA_APK=$(sha256sum "$APK_BUNDLE"               | cut -d' ' -f1)
          echo "expo-bundle-correct.js : $SHA_EXPO"
          echo "APK extracted bundle   : $SHA_APK"

          if [ "$SHA_EXPO" != "$SHA_APK" ]; then
            echo "FAIL: SHA ne poklapa — APK ne sadrži naš bundle!"
            exit 1
          fi
          echo "OK: SHA identičan — APK sadrži točno naš expo bundle"

          echo ""
          echo "=== grep provjere na APK-extracted bundleu ==="

          C=$(grep -c "class MessageQueue {" "$APK_BUNDLE" || true)
          echo "class MessageQueue { : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -c "_default = MessageQueue" "$APK_BUNDLE" || true)
          echo "_default = MessageQueue : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -cP '(?<![a-zA-Z0-9_])#name(?![a-zA-Z0-9_])' "$APK_BUNDLE" || true)
          echo "#name raw : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -cP '(?<![a-zA-Z0-9_])#code(?![a-zA-Z0-9_])' "$APK_BUNDLE" || true)
          echo "#code raw : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          if ! head -20 "$APK_BUNDLE" | grep -q "DOMException"; then
            echo "FAIL: DOMException nije u headeru APK bundlea"
            exit 1
          fi
          echo "DOMException u headeru : OK"

          echo ""
          echo "=== SVE PROVJERE PROŠLE — APK je valjan ==="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trampaj-v1.1.0-release
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
