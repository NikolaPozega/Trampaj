name: Verify Bundle (no APK build)

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Remove baseUrl from app.json
        run: |
          node -e "
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('artifacts/mobile/app.json'));
          if (d.expo && d.expo.experiments) delete d.expo.experiments.baseUrl;
          fs.writeFileSync('artifacts/mobile/app.json', JSON.stringify(d, null, 2));
          "

      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: pnpm install --no-frozen-lockfile

      - name: Expo prebuild (generate android/)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_DOMAIN: trampaj.hr
        run: npx expo prebuild --platform android --clean --no-install

      - name: Generate expo export bundle (fixed Babel/Metro pipeline)
        working-directory: artifacts/mobile
        env:
          NODE_ENV: production
          EXPO_PUBLIC_DOMAIN: trampaj.hr
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          node_modules/.bin/expo export \
            --platform android \
            --output-dir /tmp/expo-bundle \
            --no-bytecode

          BUNDLE=$(ls /tmp/expo-bundle/_expo/static/js/android/*.js | head -1)
          cp "$BUNDLE" /tmp/expo-bundle-correct.js

          echo "=== expo-bundle-correct.js ==="
          echo "Veličina : $(wc -c < /tmp/expo-bundle-correct.js) bytes"
          echo "SHA256   : $(sha256sum /tmp/expo-bundle-correct.js | cut -d' ' -f1)"

      - name: Hermesc compile test (realni hermesc iz projekta)
        run: |
          HERMESC=$(find node_modules artifacts/mobile/node_modules \
            -path "*/hermesc/linux64-bin/hermesc" -type f 2>/dev/null | head -1)
          echo "=== hermesc compile test ==="
          echo "hermesc binarni: $HERMESC"

          if [ -z "$HERMESC" ]; then
            echo "FAIL: hermesc nije pronađen"
            exit 1
          fi

          echo "hermesc --version output:"
          timeout 10 "$HERMESC" --version 2>&1 || true

          echo ""
          echo "Pokretanje hermesc na bundle-u..."
          HERMESC_OUT=$(timeout 60 "$HERMESC" \
            -O -emit-binary \
            -output-source-map \
            -out=/tmp/bundle.hbc \
            /tmp/expo-bundle-correct.js 2>&1)
          HERMESC_EXIT=$?
          echo "hermesc stdout/stderr:"
          echo "$HERMESC_OUT"
          echo "hermesc exit code: $HERMESC_EXIT"

          if [ $HERMESC_EXIT -eq 0 ]; then
            echo "OK: hermesc je uspješno kompajlirao bundle — Hermes-compatible"
          elif echo "$HERMESC_OUT" | grep -q "invalid statement\|SyntaxError\|unexpected token\|parse error"; then
            echo "FAIL: hermesc JS parse error (bundle nije Hermes-compatible)"
            exit 1
          else
            echo "WARN: hermesc pao s binarnom greškom (poznati linux64 issue, nije JS greška)"
            echo "Nastavlja se s grep provjerama kao alternativnim dokazom..."
          fi

      - name: Class syntax provjere — PrivateValueStore i ostale class deklaracije
        run: |
          BUNDLE="/tmp/expo-bundle-correct.js"

          echo "=== Provjera class sintakse u bundleu ==="

          echo "--- PrivateValueStore kontekst ---"
          grep -n "PrivateValueStore" "$BUNDLE" || echo "(nije pronađen)"

          echo ""
          echo "--- ES6 class deklaracije (class <name> {) ---"
          CLASS_COUNT=$(grep -cP '\bclass\s+\w+\s*\{' "$BUNDLE" || true)
          echo "Pronađeno class deklaracija: $CLASS_COUNT"
          grep -nP '\bclass\s+\w+\s*\{' "$BUNDLE" | head -20 || echo "(nema)"

          echo ""
          echo "--- Prazne class deklaracije (class t{}, class n{} itd.) ---"
          EMPTY_CLASS=$(grep -cP '\bclass\s+\w+\s*\{\s*\}' "$BUNDLE" || true)
          echo "Praznih class deklaracija: $EMPTY_CLASS"
          grep -nP '\bclass\s+\w+\s*\{\s*\}' "$BUNDLE" | head -10 || echo "(nema)"

          echo ""
          if [ "$CLASS_COUNT" -gt 0 ]; then
            echo "FAIL: Bundle još uvijek sadrži ES6 class deklaracije ($CLASS_COUNT kom)"
            echo "Fix nije primjenjen ili nije ispravan"
            exit 1
          fi
          echo "OK: Nema ES6 class deklaracija u bundleu"

      - name: Fail-fast grep provjere (Hermes crash pattern)
        run: |
          BUNDLE="/tmp/expo-bundle-correct.js"
          echo "=== grep provjere na bundleu ==="

          C=$(grep -c "class MessageQueue {" "$BUNDLE" || true)
          echo "class MessageQueue { : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -c "_default = MessageQueue" "$BUNDLE" || true)
          echo "_default = MessageQueue : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -cP '(?<![a-zA-Z0-9_])#name(?![a-zA-Z0-9_])' "$BUNDLE" || true)
          echo "#name raw : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          C=$(grep -cP '(?<![a-zA-Z0-9_])#code(?![a-zA-Z0-9_])' "$BUNDLE" || true)
          echo "#code raw : $C"
          [ "$C" -gt 0 ] && echo "FAIL" && exit 1

          if ! head -20 "$BUNDLE" | grep -q "DOMException"; then
            echo "FAIL: DOMException nije u headeru"
            exit 1
          fi
          echo "DOMException u headeru : OK"

          echo ""
          echo "=== SVE PROVJERE PROŠLE ==="
          echo "Bundle spreman za assembleRelease (uz odobrenje)"
